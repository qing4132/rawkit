# Extra RAW samples manifest — formats / bodies not covered by samples/.
#
# samples/ ships the maintainer's own ~8 formats (CR3 / ARW / NEF / DNG /
# RAF / RW2 / ORF / 3FR) from cameras they actually shoot. This manifest
# downloads on-demand samples to samples/extras/ so cross-backend
# equivalence tests (lite vs exiftool) can run against formats and bodies
# the maintainer doesn't physically own.
#
# Run:
#   uv run python scripts/fetch_samples.py            # mainstream tier only
#   uv run python scripts/fetch_samples.py --legacy   # also pull legacy tier
#   RAWKIT_TEST_SAMPLES=samples/extras uv run pytest tests/test_exif_lite.py -v
#
# ----------------------------------------------------------------------------
# Entry schema
# ----------------------------------------------------------------------------
#
#   [[file]]
#   url      = "https://..."          # direct, stable download URL
#   sha256   = ""                     # empty on first add; fetch_samples.py
#                                     # prints observed hash for you to paste back
#   format   = "cr2"                  # lowercase extension (without dot)
#   camera   = "Canon EOS 40D"        # what produced this file
#   license  = "CC0"                  # CC0 / CC-BY / CC-BY-SA / public-domain
#   source   = "raw.pixls.us"         # human-readable source label
#   tier     = "mainstream"           # "mainstream" or "legacy" — see below
#   notes    = ""                     # optional: what this sample stress-tests
#
# Hash-empty workflow (nix/bazel style):
#   1. Add [[file]] with sha256 = ""
#   2. Run fetch_samples.py — it downloads, computes sha256, prints it
#   3. Paste the printed hash back into the manifest, re-run to verify
#
# ----------------------------------------------------------------------------
# Tier semantics
# ----------------------------------------------------------------------------
#
# tier = "mainstream"
#   Cameras / formats with meaningful user base in 2026: 2022+ flagships and
#   the few still-active legacy formats (Canon CR2 → huge installed base,
#   Phase One IIQ → professional medium format, Pentax PEF → only remaining
#   Pentax-branded RAW). Pulled by default.
#
# tier = "legacy"
#   Discontinued or near-dead lineages kept as "lite must not crash on these"
#   regression samples — but not worth optimising new code for. Examples:
#   Samsung NX (left market 2015), Minolta MRW (2006), Epson R-D1 (2007),
#   Leaf MOS, early Nikon Coolpix NRW, Canon CRW (pre-2004), Sigma Foveon
#   X3F (no new bodies since 2014). Pulled only with --legacy.
#
# A note on Sigma X3F / Minolta MRW: their custom container parsers were
# removed from _exif_lite.py (2026-06-23) — these formats fall through to
# the rawpy fallback path, slow but correct. They are intentionally NOT
# in this manifest anymore.
#
# Sources used here:
#   * raw.pixls.us  — CC0 community samples, browsable Apache autoindex
#                     at /data/<Make>/<Model>/<file>


