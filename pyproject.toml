[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rawkit"
version = "0.0.0"
description = "RAW photography swiss-army CLI: thumbnails, metadata, simple queries"
authors = [ { name = "qinglin" } ]
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "rawpy",
    "Pillow",
    "typer",
]

[project.scripts]
rawkit = "rawkit.cli:app"
